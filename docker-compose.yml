services:

  # ─────────────────────────────────────────────
  # Qdrant — vector store
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # App — Streamlit + RAG
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data-copilot-prf
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local